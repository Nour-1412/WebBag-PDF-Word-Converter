<section class="hero">

    <div class="hero-container">

        <h1>
            <span class="pdf-text">PDF</span>

            <span class="arrow">↔</span>

            <span class="word-text">Word</span>

            Converter
        </h1>

        <p>
            Convert PDF to Word and Word to PDF online for free.
            Fast, secure and privacy-friendly.
        </p>

        <div class="converter-switch">

            <button
                class="switch-btn active"
                id="pdfToWordBtn">

                PDF → Word

            </button>

            <button
                class="switch-btn"
                id="wordToPdfBtn">

                Word → PDF

            </button>

        </div>

    </div>

</section>
<section class="upload-section">

    <div class="upload-card">

        <div class="upload-header">

            <h2 id="toolTitle">
                PDF → Word
            </h2>

            <span class="badge">
                Free Converter
            </span>

        </div>

        <div id="dropArea" class="drop-area">

            <div class="upload-icon">

                📄

            </div>

            <h3>

                Drag & Drop your file here

            </h3>

            <p>

                or

            </p>

            <button
                type="button"
                class="choose-btn"
                id="chooseFile">

                Choose File

            </button>

            <input
                type="file"
                id="fileInput"
                hidden>

            <small>

                Maximum file size: 50 MB

            </small>

        </div>

    </div>

</section>
